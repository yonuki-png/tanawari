<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>棚割りAR</title>
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<style>
body{margin:0;overflow:hidden;font-family:-apple-system,sans-serif;background:#000}
#setup{position:fixed;inset:0;z-index:999;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px;overflow-y:auto}
#setup h1{color:#fff;font-size:20px;font-weight:700;text-align:center;margin:0}
#setup p{color:rgba(255,255,255,.6);font-size:13px;text-align:center;line-height:1.6;margin:0}
.cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.card{background:#fff;border-radius:12px;padding:10px;display:flex;flex-direction:column;align-items:center;gap:6px;width:148px}
.card img{width:120px;height:120px;object-fit:contain}
.clbl{font-size:12px;font-weight:700;color:#333}
.csub{font-size:11px;color:#666;text-align:center}
.sbtn{background:#2563eb;color:#fff;border:none;padding:16px 24px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;width:100%;max-width:320px}
#ar-ui{position:fixed;inset:0;z-index:100;pointer-events:none;display:none}
#top{position:absolute;top:0;left:0;right:0;padding:env(safe-area-inset-top,16px) 16px 14px;background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent);display:flex;align-items:center;justify-content:space-between}
#sname{font-size:16px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.7)}
#st{font-size:12px;color:#fff;padding:4px 12px;border-radius:20px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3)}
#st.found{background:rgba(30,180,80,.4);border-color:rgba(60,220,100,.7)}
#guide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#gframe{width:220px;height:220px;border-radius:12px;border:2px solid rgba(100,180,255,.7);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(100,180,255,0)}50%{box-shadow:0 0 0 8px rgba(100,180,255,.2)}}
#gtxt{color:rgba(255,255,255,.9);font-size:15px;font-weight:500;text-align:center;text-shadow:0 1px 4px rgba(0,0,0,.7)}
#bbar{position:absolute;bottom:0;left:0;right:0;padding:12px 16px calc(12px + env(safe-area-inset-bottom,0px));background:linear-gradient(to top,rgba(0,0,0,.75),transparent);display:flex;align-items:center;justify-content:space-between;pointer-events:auto}
#inav{display:flex;align-items:center;gap:12px;opacity:0;transition:opacity .3s}
#inav.show{opacity:1}
.nbtn{width:48px;height:48px;border-radius:50%;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer}
#ilbl{color:#fff;font-size:13px;font-weight:600;text-align:center;text-shadow:0 1px 4px rgba(0,0,0,.7);min-width:50px}
#bbtn{color:rgba(255,255,255,.6);font-size:12px;cursor:pointer;padding:8px}
</style>
</head>

<div id="ar-ui">
  <div id="top"><div id="sname">棚割りAR</div><div id="st">スキャン中</div></div>
  <div id="guide"><div id="gframe"></div><div id="gtxt">マーカーにカメラを向けてください</div></div>
  <div id="bbar">
    <div id="bbtn" onclick="window.location.reload()">← 戻る</div>
    <div id="inav">
      <div class="nbtn" onclick="ci(-1)">&#8249;</div>
      <div id="ilbl">-</div>
      <div class="nbtn" onclick="ci(1)">&#8250;</div>
    </div>
  </div>
</div>

<script>
var ST = {marker:null, timer:null};
function startAR(){
  document.getElementById('setup').style.display='none';
  document.getElementById('ar-ui').style.display='block';
  var scene=document.getElementById('scene');
  function setup(){
    document.querySelector('a-marker[preset="hiro"]').addEventListener('markerFound',function(){onFound('hiro');});
    document.querySelector('a-marker[preset="hiro"]').addEventListener('markerLost', function(){onLost('hiro');});
    document.querySelector('a-marker[preset="kanji"]').addEventListener('markerFound',function(){onFound('kanji');});
    document.querySelector('a-marker[preset="kanji"]').addEventListener('markerLost', function(){onLost('kanji');});
  }
  if(scene.hasLoaded) setup(); else scene.addEventListener('loaded',setup,{once:true});
}
function onFound(m){
  clearTimeout(ST.timer); ST.marker=m;
  document.getElementById('guide').style.display='none';
  document.getElementById('inav').classList.add('show');
  document.getElementById('sname').textContent = m==='hiro'?'おかし棚':'酒棚';
  document.getElementById('ilbl').textContent  = m==='hiro'?'おかし棚':'酒棚';
  var s=document.getElementById('st'); s.textContent='認識中'; s.className='found'; s.id='st';
}
function onLost(m){
  ST.timer=setTimeout(function(){
    document.getElementById('guide').style.display='flex';
    document.getElementById('inav').classList.remove('show');
    document.getElementById('sname').textContent='棚割りAR';
    var s=document.getElementById('st'); s.textContent='スキャン中'; s.className=''; s.id='st';
    ST.marker=null;
  },2000);
}
function ci(dir){}
</script>
